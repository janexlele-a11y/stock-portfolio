<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📈 股票顶盘</title>
  <style>
    /* === 妙答波普风格变量 === */
    :root {
      --primary: #FFDE00;
      --accent-red: #FF3B30;
      --accent-green: #4CD964;
      --accent-blue: #007AFF;
      --black: #000000;
      --white: #FFFFFF;
      --card-bg: #FFFFFF;
      --border-width: 6px;
      --shadow: 8px 8px 0px var(--black);
      --radius: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--primary);
      /* 波普风网点纹理 */
      background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
      background-size: 20px 20px;
      min-height: 100vh;
      padding: 20px;
    }

    /* === 顶部标题卡 === */
    .header-card {
      background: var(--black);
      border: var(--border-width) solid var(--black);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .header-title {
      color: var(--primary);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-subtitle {
      color: var(--white);
      font-size: 14px;
      margin-top: 6px;
      opacity: 0.8;
    }

    /* === 统计概览卡 === */
    .stats-card {
      background: var(--white);
      border: var(--border-width) solid var(--black);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 900;
      color: var(--black);
    }

    .stat-value.positive { color: var(--accent-green); }
    .stat-value.negative { color: var(--accent-red); }

    /* === 个股卡片 === */
    .stock-card {
      background: var(--white);
      border: var(--border-width) solid var(--black);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      margin-bottom: 16px;
      transition: transform 0.15s ease;
    }

    .stock-card:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0px var(--black);
    }

    .stock-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .stock-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--black);
    }

    .stock-code {
      font-size: 12px;
      color: #888;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }

    .stock-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stock-price-block {
      text-align: left;
    }

    .stock-price {
      font-size: 26px;
      font-weight: 900;
      color: var(--black);
    }

    .stock-change {
      font-size: 14px;
      font-weight: 700;
      margin-left: 8px;
    }

    .stock-change.up { color: var(--accent-red); }
    .stock-change.down { color: var(--accent-green); }

    /* === 波普风按钮 === */
    .pop-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: var(--black);
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      border: 4px solid var(--black);
      border-radius: 12px;
      padding: 10px 16px;
      box-shadow: 4px 4px 0px var(--black);
      cursor: pointer;
      transition: all 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .pop-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--black);
    }

    .pop-btn.blue {
      background: var(--accent-blue);
      color: var(--white);
    }

    /* === 底部 === */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(0,0,0,0.5);
    }

    /* === 3D按钮按压效果 === */
    @media (hover: hover) {
      .pop-btn:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px var(--black);
      }
    }
  </style>
</head>
